<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TodoList</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f0f2f5;
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100vh; padding: 60px 20px;
  }
  .container {
    width: 100%; max-width: 520px;
    background: #fff; border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 32px;
  }
  h1 { text-align: center; color: #1a1a2e; font-size: 28px; margin-bottom: 24px; }
  .input-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .input-row input {
    flex: 1; padding: 12px 16px; border: 2px solid #e0e0e0;
    border-radius: 8px; font-size: 16px; outline: none;
    transition: border-color 0.2s;
  }
  .input-row input:focus { border-color: #4f6ef7; }
  .input-row button {
    padding: 12px 24px; background: #4f6ef7; color: #fff;
    border: none; border-radius: 8px; font-size: 16px; cursor: pointer;
    font-weight: 600; transition: background 0.2s;
  }
  .input-row button:hover { background: #3b54d4; }
  .filters { display: flex; gap: 8px; margin-bottom: 16px; }
  .filters button {
    flex: 1; padding: 8px; border: 2px solid #e0e0e0;
    background: #fff; border-radius: 8px; cursor: pointer;
    font-size: 14px; transition: all 0.2s;
  }
  .filters button.active { background: #4f6ef7; color: #fff; border-color: #4f6ef7; }
  .task-list { list-style: none; }
  .task-list li {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border-bottom: 1px solid #f0f0f0;
    transition: background 0.2s;
  }
  .task-list li:hover { background: #f8f9fb; }
  .task-list li.dragging { opacity: 0.5; background: #eef0ff; }
  .task-list li.drag-over { border-top: 2px solid #4f6ef7; }
  .task-list li:last-child { border-bottom: none; }
  .task-list .checkbox {
    width: 22px; height: 22px; border: 2px solid #ccc;
    border-radius: 50%; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .task-list .checkbox:hover { border-color: #4f6ef7; }
  .task-list li.completed .checkbox {
    background: #4f6ef7; border-color: #4f6ef7;
  }
  .task-list .checkbox::after {
    content: "✓"; color: #fff; font-size: 13px; font-weight: bold;
    opacity: 0; transition: opacity 0.2s;
  }
  .task-list li.completed .checkbox::after { opacity: 1; }
  .task-list .text {
    flex: 1; font-size: 16px; word-break: break-word;
  }
  .task-list li.completed .text { color: #bbb; text-decoration: line-through; }
  .task-list .text[contenteditable="true"] {
    outline: none; border-bottom: 2px solid #4f6ef7;
    background: #f8f9fb; padding: 2px 4px; border-radius: 4px;
  }
  .task-list .delete {
    background: none; border: none; color: #ccc; cursor: pointer;
    font-size: 20px; line-height: 1; padding: 4px; transition: color 0.2s;
  }
  .task-list .delete:hover { color: #e74c3c; }
  .footer {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 16px; padding-top: 16px; border-top: 1px solid #f0f0f0;
    color: #999; font-size: 14px;
  }
  .footer button {
    background: none; border: none; color: #999; cursor: pointer; font-size: 14px;
    transition: color 0.2s;
  }
  .footer button:hover { color: #e74c3c; }
  .empty {
    text-align: center; padding: 40px 0; color: #ccc; font-size: 16px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Todo List</h1>
  <div class="input-row">
    <input type="text" id="input" placeholder="添加新任务..." maxlength="120">
    <button id="addBtn">添加</button>
  </div>
  <div class="filters">
    <button data-filter="all" class="active">全部</button>
    <button data-filter="active">未完成</button>
    <button data-filter="completed">已完成</button>
  </div>
  <ul class="task-list" id="taskList"></ul>
  <div class="footer">
    <span id="counter"></span>
    <button id="clearCompleted">清除已完成</button>
  </div>
</div>

<script>
  const input = document.getElementById('input');
  const addBtn = document.getElementById('addBtn');
  const taskList = document.getElementById('taskList');
  const counter = document.getElementById('counter');
  const clearCompletedBtn = document.getElementById('clearCompleted');
  const filterBtns = document.querySelectorAll('.filters button');

  let tasks = JSON.parse(localStorage.getItem('todolist') || '[]');
  let filter = 'all';

  function save() { localStorage.setItem('todolist', JSON.stringify(tasks)); }

  function render() {
    const filtered = filter === 'all' ? tasks
      : filter === 'active' ? tasks.filter(t => !t.done)
      : tasks.filter(t => t.done);

    taskList.innerHTML = '';
    if (filtered.length === 0) {
      taskList.innerHTML = `<div class="empty">暂无任务</div>`;
    } else {
      filtered.forEach(t => {
        const li = document.createElement('li');
        li.draggable = true;
        li.dataset.id = t.id;
        if (t.done) li.classList.add('completed');
        li.innerHTML = `
          <span class="checkbox"></span>
          <span class="text">${escape(t.text)}</span>
          <button class="delete">×</button>
        `;
        taskList.appendChild(li);
      });
    }
    const active = tasks.filter(t => !t.done).length;
    counter.textContent = `${active} 项未完成`;
  }

  function escape(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function add() {
    const text = input.value.trim();
    if (!text) return;
    tasks.unshift({ id: Date.now(), text, done: false, order: Date.now() });
    input.value = '';
    save(); render();
  }

  addBtn.addEventListener('click', add);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') add(); });

  taskList.addEventListener('click', e => {
    const li = e.target.closest('li');
    if (!li) return;
    const id = +li.dataset.id;
    if (e.target.classList.contains('checkbox')) {
      const t = tasks.find(t => t.id === id);
      if (t) { t.done = !t.done; save(); render(); }
    }
    if (e.target.classList.contains('delete')) {
      tasks = tasks.filter(t => t.id !== id);
      save(); render();
    }
  });

  // Double-click to edit
  taskList.addEventListener('dblclick', e => {
    const textEl = e.target.closest('.text');
    if (!textEl) return;
    const li = textEl.closest('li');
    const id = +li.dataset.id;
    const original = textEl.textContent;
    textEl.contentEditable = 'true';
    textEl.focus();
    const range = document.createRange();
    range.selectNodeContents(textEl);
    const sel = window.getSelection();
    sel.removeAllRanges(); sel.addRange(range);

    function finish() {
      textEl.contentEditable = 'false';
      const newText = textEl.textContent.trim();
      if (newText && newText !== original) {
        const t = tasks.find(t => t.id === id);
        if (t) { t.text = newText; save(); }
      } else if (!newText) {
        textEl.textContent = original;
      }
      render();
    }
    textEl.addEventListener('blur', finish, { once: true });
    textEl.addEventListener('keydown', function handler(e) {
      if (e.key === 'Enter') { e.preventDefault(); textEl.blur(); }
      if (e.key === 'Escape') { textEl.textContent = original; textEl.blur(); }
      textEl.removeEventListener('keydown', handler);
    });
  });

  // Drag & drop
  let dragId = null;
  taskList.addEventListener('dragstart', e => {
    const li = e.target.closest('li');
    if (!li) return;
    dragId = +li.dataset.id;
    li.classList.add('dragging');
  });
  taskList.addEventListener('dragend', e => {
    e.target.closest('li')?.classList.remove('dragging');
    dragId = null;
  });
  taskList.addEventListener('dragover', e => {
    e.preventDefault();
    const li = e.target.closest('li');
    if (!li || +li.dataset.id === dragId) return;
    li.classList.add('drag-over');
  });
  taskList.addEventListener('dragleave', e => {
    e.target.closest('li')?.classList.remove('drag-over');
  });
  taskList.addEventListener('drop', e => {
    e.preventDefault();
    const li = e.target.closest('li');
    if (!li) return;
    li.classList.remove('drag-over');
    const targetId = +li.dataset.id;
    if (dragId === targetId) return;
    const from = tasks.findIndex(t => t.id === dragId);
    const to = tasks.findIndex(t => t.id === targetId);
    if (from === -1 || to === -1) return;
    const [moved] = tasks.splice(from, 1);
    tasks.splice(to, 0, moved);
    save(); render();
  });

  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.filter;
      render();
    });
  });

  clearCompletedBtn.addEventListener('click', () => {
    if (!tasks.some(t => t.done)) return;
    tasks = tasks.filter(t => !t.done);
    save(); render();
  });

  render();
</script>
</body>
</html>
